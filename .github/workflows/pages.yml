name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Prepare Pages content
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          mkdir -p _pages
          pandoc README.md -f gfm -t html5 -s \
            --metadata title="CH32V003 HID bootloader" \
            -o _pages/index.html
          cp webhid-flasher.html _pages/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

      - id: deployment
        uses: actions/deploy-pages@v4