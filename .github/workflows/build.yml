name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xPack RISC-V GCC 15.2.0
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y wget xz-utils
          wget -qO /tmp/xpack.tar.gz \
            https://github.com/xpack-dev-tools/riscv-none-elf-gcc-xpack/releases/download/v15.2.0-1/xpack-riscv-none-elf-gcc-15.2.0-1-linux-x64.tar.gz
          sudo mkdir -p /opt
          sudo tar -xzf /tmp/xpack.tar.gz -C /opt
          echo "/opt/xpack-riscv-none-elf-gcc-15.2.0-1/bin" >> "$GITHUB_PATH"

      - name: Configure
        run: cmake -S . -B build -G Ninja

      - name: Build
        run: cmake --build build

      - name: Upload bootloader artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ch32v003-hid-bootloader
          path: |
            bin/*.elf
            bin/*.bin
            bin/*.map

  release:
    needs: build
    if: github.event_name == 'push' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whether firmware-affecting files changed
        id: srccheck
        run: |
          set -e
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            changed=$(git diff --name-only HEAD^ HEAD)
          else
            # Root commit (no parent): everything is new, treat as firmware-touching.
            changed=$(git ls-files)
          fi
          hit=$(printf '%s\n' "$changed" \
            | grep -E '^(src/|rv003usb/|linker\.ld$|CMakeLists\.txt$)' || true)
          if [ -z "$hit" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No firmware-affecting files changed in this commit; skipping release."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Firmware-affecting files changed:"
            echo "$hit"
          fi

      - name: Resolve short SHA
        if: steps.srccheck.outputs.changed == 'true'
        id: sha
        run: echo "short=$(echo $GITHUB_SHA | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Download bootloader artifacts
        if: steps.srccheck.outputs.changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ch32v003-hid-bootloader
          path: bin

      - name: Create release
        if: steps.srccheck.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: Build ${{ steps.sha.outputs.short }}
          generate_release_notes: true
          files: |
            bin/*.elf
            bin/*.bin
            bin/*.map